    <script>
        (function () {
            document.documentElement.classList.add("is-booting");

            var performanceModeKey = "sksir-performance-mode";

            function getStoredPerformanceMode() {
                try {
                    return normalizePerformanceMode(localStorage.getItem(performanceModeKey));
                } catch (e) {
                    return "auto";
                }
            }

            function normalizePerformanceMode(mode) {
                if (mode === "full" || mode === "lite") return mode;
                return "auto";
            }

            function isIosDevice() {
                var ua = navigator.userAgent || "";
                var platform = navigator.platform || "";
                return /iP(hone|ad|od)/.test(ua) || (platform === "MacIntel" && navigator.maxTouchPoints > 1);
            }

            function shouldUseLitePerformanceMode(mode) {
                if (mode === "lite") return true;
                if (mode === "full") return false;

                var reduceMotion = false;
                try {
                    reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
                } catch (e) {}
                if (reduceMotion) return true;

                var connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                if (connection && connection.saveData) return true;

                var isIOS = isIosDevice();
                var memory = navigator.deviceMemory || 0;
                var cores = navigator.hardwareConcurrency || 0;
                if (memory && memory <= 2) return true;
                if (!isIOS && memory && memory <= 4 && cores && cores <= 4) return true;
                if (!isIOS && !memory && cores && cores <= 2) return true;
                return false;
            }

            function applyPerformanceMode() {
                var mode = getStoredPerformanceMode();
                var lite = shouldUseLitePerformanceMode(mode);
                document.documentElement.classList.toggle("perf-lite", lite);
                document.documentElement.setAttribute("data-performance-mode", mode);
                document.documentElement.setAttribute("data-performance-active", lite ? "lite" : "full");
                if (window.jQuery && window.jQuery.fx) {
                    window.jQuery.fx.off = lite;
                }
                if (lite) {
                    var bg = document.getElementById("bg");
                    if (bg) {
                        bg.style.transform = "scale(1)";
                        bg.style.filter = "blur(0px)";
                        bg.style.transition = "none";
                    }
                }
            }

            applyPerformanceMode();
            window.applySksirPerformanceMode = applyPerformanceMode;

            function isIosSafari() {
                var ua = navigator.userAgent || "";
                var isIOS = isIosDevice();
                var isSafari = /Safari/.test(ua) && !/(CriOS|FxiOS|EdgiOS|OPiOS|DuckDuckGo)/.test(ua);
                return isIOS && isSafari;
            }

            var iosHeightTimer = 0;
            var iosKeyboardTimer = 0;
            var iosKeyboardLocked = false;
            var iosLastAppHeight = 0;
            var iosLastBgHeight = 0;
            var iosKeyboardReleaseTries = 0;

            function isFormControl(element) {
                return element && /^(INPUT|TEXTAREA|SELECT)$/.test(element.tagName);
            }

            function getIosViewportHeight() {
                var viewport = window.visualViewport;
                return viewport && viewport.height ? viewport.height : window.innerHeight;
            }

            function getIosBgHeight(appHeight, allowShrink) {
                var doc = document.documentElement;
                var layoutHeight = Math.max(window.innerHeight || 0, doc.clientHeight || 0);
                var nextHeight = Math.ceil(Math.max(appHeight || 0, layoutHeight || 0));

                if (!nextHeight) return iosLastBgHeight || appHeight || 0;
                if (!allowShrink && iosLastBgHeight) {
                    nextHeight = Math.max(nextHeight, iosLastBgHeight);
                }
                iosLastBgHeight = nextHeight;
                return nextHeight;
            }

            function setIosAppHeight(allowShrink) {
                if (!allowShrink && (iosKeyboardLocked || isFormControl(document.activeElement))) {
                    return false;
                }
                var height = Math.ceil(getIosViewportHeight());
                if (!height) return false;
                if (!allowShrink && iosLastAppHeight && height < iosLastAppHeight - 24) {
                    return false;
                }
                iosLastAppHeight = height;
                document.documentElement.style.setProperty("--app-height", height + "px");
                document.documentElement.style.setProperty("--ios-bg-height", getIosBgHeight(height, allowShrink) + "px");
                return true;
            }

            function scheduleIosAppHeight(delay, allowShrink) {
                clearTimeout(iosHeightTimer);
                iosHeightTimer = setTimeout(function () {
                    setIosAppHeight(allowShrink);
                }, delay || 0);
            }

            function releaseIosKeyboardLock() {
                clearTimeout(iosKeyboardTimer);
                iosKeyboardLocked = false;
                if (!setIosAppHeight(false)) {
                    iosKeyboardReleaseTries += 1;
                    if (iosKeyboardReleaseTries < 6) {
                        iosKeyboardTimer = setTimeout(releaseIosKeyboardLock, 180);
                    } else {
                        setIosAppHeight(true);
                        iosKeyboardReleaseTries = 0;
                    }
                    return;
                }
                iosKeyboardReleaseTries = 0;
                requestAnimationFrame(function () {
                    setIosAppHeight(false);
                });
            }

            var iosSafari = isIosSafari();
            if (iosSafari) {
                document.documentElement.classList.add("ios-safari");
                setIosAppHeight(true);
                window.addEventListener("resize", function () {
                    scheduleIosAppHeight(80, false);
                }, { passive: true });
                window.addEventListener("orientationchange", function () {
                    iosKeyboardLocked = false;
                    iosLastAppHeight = 0;
                    iosLastBgHeight = 0;
                    scheduleIosAppHeight(360, true);
                }, { passive: true });
                document.addEventListener("focusin", function (event) {
                    if (isFormControl(event.target)) {
                        iosKeyboardLocked = true;
                        iosKeyboardReleaseTries = 0;
                        clearTimeout(iosHeightTimer);
                        clearTimeout(iosKeyboardTimer);
                    }
                }, true);
                document.addEventListener("focusout", function (event) {
                    if (isFormControl(event.target)) {
                        iosKeyboardLocked = true;
                        clearTimeout(iosKeyboardTimer);
                        iosKeyboardTimer = setTimeout(releaseIosKeyboardLock, 520);
                    }
                }, true);
                if (window.visualViewport) {
                    window.visualViewport.addEventListener("resize", function () {
                        scheduleIosAppHeight(80, false);
                    }, { passive: true });
                    window.visualViewport.addEventListener("scroll", function () {
                        scheduleIosAppHeight(80, false);
                    }, { passive: true });
                }
            }

            try {
                if (!iosSafari && localStorage.getItem("misans-font-ready") === "1") {
                    document.documentElement.classList.add("font-misans");
                }
            } catch (e) {}

            window.__sksirBootFallbackTimer = window.setTimeout(function () {
                var root = document.documentElement;
                root.classList.add("is-first-screen-ready");
                window.setTimeout(function () {
                    root.classList.remove("is-booting");
                    root.classList.remove("is-first-screen-ready");
                }, 700);
            }, 4800);
        }());
